<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청 완료 — 수북정원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F2EBE0;
  --warm-white: #FAF6EE;
  --olive: #6B7C52;
  --olive-dark: #4A5A38;
  --olive-light: #9BAF7E;
  --bark: #7A6248;
  --stone: #C4B99A;
  --stone-light: #DDD4C0;
  --earth: #3D3128;
  --text-main: #4A2E1A;
  --text-muted: #8A7A68;
  --serif: 'Cormorant Garamond', 'Noto Serif KR', serif;
  --sans: 'Noto Sans KR', sans-serif;
}
html, body {
  height: 100%;
  background: var(--olive);
  font-family: var(--sans);
  overflow: hidden;
}
.bg {
  position: fixed;
  inset: 0;
  background: var(--olive);
  overflow: hidden;
}
.bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(74,90,56,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(107,124,82,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(58,68,42,0.5) 0%, transparent 55%);
}
.leaf {
  position: absolute;
  opacity: 0.06;
  font-family: var(--serif);
  font-size: clamp(120px, 20vw, 240px);
  font-style: italic;
  color: rgba(250,246,238,1);
  letter-spacing: -0.02em;
  user-select: none;
  line-height: 1;
}
.leaf-1 { top: -40px; left: -20px; }
.leaf-2 { bottom: -60px; right: -10px; font-size: clamp(100px, 16vw, 200px); }

.wrap {
  position: relative;
  z-index: 10;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}

.logo {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  color: rgba(250,246,238,0.5);
  letter-spacing: 0.15em;
  margin-bottom: 60px;
  opacity: 0;
  animation: fadeUp 0.8s 0.1s ease forwards;
}

.icon-wrap {
  width: 72px;
  height: 72px;
  border: 1px solid rgba(250,246,238,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 36px;
  opacity: 0;
  animation: fadeUp 0.8s 0.3s ease forwards;
}
.icon-wrap svg {
  width: 28px;
  height: 28px;
  stroke: rgba(250,246,238,0.85);
}

.title {
  font-family: var(--serif);
  font-size: clamp(36px, 8vw, 64px);
  font-weight: 300;
  color: var(--warm-white);
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.9s 0.5s ease forwards;
}
.title em {
  font-style: italic;
  color: rgba(250,246,238,0.75);
}

.desc {
  font-size: 14px;
  font-weight: 300;
  color: rgba(250,246,238,0.65);
  line-height: 2;
  max-width: 340px;
  margin: 0 auto 48px;
  opacity: 0;
  animation: fadeUp 0.9s 0.7s ease forwards;
}

.divider {
  width: 40px;
  height: 1px;
  background: rgba(250,246,238,0.25);
  margin: 0 auto 48px;
  opacity: 0;
  animation: fadeUp 0.9s 0.8s ease forwards;
}

.info {
  font-size: 12px;
  font-weight: 300;
  color: rgba(250,246,238,0.45);
  letter-spacing: 0.1em;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 0.9s 0.9s ease forwards;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: rgba(250,246,238,0.75);
  text-decoration: none;
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.2em;
  border-bottom: 1px solid rgba(250,246,238,0.25);
  padding-bottom: 4px;
  transition: color 0.3s, border-color 0.3s;
  opacity: 0;
  animation: fadeUp 0.9s 1.1s ease forwards;
}
.btn-back:hover {
  color: rgba(250,246,238,1);
  border-color: rgba(250,246,238,0.6);
}

.progress-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  height: 2px;
  background: rgba(250,246,238,0.3);
  animation: progress 5s linear forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes progress {
  from { width: 0%; }
  to { width: 100%; }
}

@media (max-width: 480px) {
  .logo { margin-bottom: 40px; }
  .icon-wrap { width: 60px; height: 60px; margin-bottom: 28px; }
  .desc { font-size: 13px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="leaf leaf-1">수북</div>
  <div class="leaf leaf-2">정원</div>
</div>

<div class="wrap">
  <div class="logo">수북정원</div>

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  </div>

  <h1 class="title">상담 신청이<br><em>완료되었습니다</em></h1>

  <p class="desc">
    소중한 문의 감사합니다.<br>
    빠른 시일 내에 담당자가<br>
    직접 연락드리겠습니다.
  </p>

  <div class="divider"></div>

  <p class="info">평일 09:00 — 18:00 · 010 · 3652 · 0749</p>

  <a href="index.html" class="btn-back">← 홈으로 돌아가기</a>
</div>

<div class="progress-bar"></div>

<script>
  // 5초 후 자동으로 홈으로 이동
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 5000);
</script>

</body>
</html>
